name: PriceTicker
options:
  deploymentTarget:
    macOS: "12.0"
  bundleIdPrefix: com.priceticker
  createIntermediateGroups: true
  xcodeVersion: "14"

targets:
  PriceTicker:
    type: application
    platform: macOS
    sources:
      - path: PriceTicker
        excludes:
          - "**/.DS_Store"
    info:
      path: PriceTicker/Info.plist
      properties:
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.finance
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026 0x2a94b5. MIT License."
    entitlements:
      path: PriceTicker/PriceTicker.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.priceticker.app
        SWIFT_VERSION: "5.7"
        MACOSX_DEPLOYMENT_TARGET: "12.0"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_FILE: PriceTicker/Info.plist
        CODE_SIGN_ENTITLEMENTS: PriceTicker/PriceTicker.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SYMROOT: $(SRCROOT)/build
        CONFIGURATION_BUILD_DIR: $(SRCROOT)/build/$(CONFIGURATION)

  PriceTickerTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "12.0"
    sources:
      - path: PriceTickerTests
    dependencies:
      - target: PriceTicker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.priceticker.tests
        SWIFT_VERSION: "5.7"
        CODE_SIGNING_ALLOWED: NO

schemes:
  PriceTicker:
    build:
      targets:
        PriceTicker: all
        PriceTickerTests:
          - test
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PriceTickerTests
      environmentVariables:
        PRICETICKER_TESTING: "1"
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
