name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release asset
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate version tag
        run: |
          app_version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' PriceTicker/Info.plist)
          if [[ "v${app_version}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app version v${app_version}." >&2
            exit 1
          fi
          notes_file=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [[ ! -s "${notes_file}" ]]; then
            echo "Missing release notes: ${notes_file}" >&2
            exit 1
          fi
      - name: Build archive
        run: |
          set -o pipefail
          xcodebuild \
            -project PriceTicker.xcodeproj \
            -scheme PriceTicker \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath build/PriceTicker.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            archive
      - name: Package and checksum
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            build/PriceTicker.xcarchive/Products/Applications/PriceTicker.app \
            PriceTicker.app.zip
          shasum -a 256 PriceTicker.app.zip > PriceTicker.app.zip.sha256
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            PriceTicker.app.zip \
            PriceTicker.app.zip.sha256 \
            --verify-tag \
            --notes-file ".github/release-notes/${GITHUB_REF_NAME}.md" \
            --title "PriceTicker ${GITHUB_REF_NAME}"
