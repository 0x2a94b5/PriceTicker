name: 功能建议 / Feature request
description: 提议新功能或体验改进。
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem
      description: 描述当前场景和痛点，不要只写解决方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案 / Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案 / Alternatives
  - type: textarea
    id: context
    attributes:
      label: 补充信息 / Additional context
      description: 可附原型、截图、相关项目或 API 文档链接。
  - type: checkboxes
    id: checks
    attributes:
      label: 提交确认 / Checklist
      options:
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
        - label: 我理解功能是否纳入及发布时间由维护者决定。
          required: true
