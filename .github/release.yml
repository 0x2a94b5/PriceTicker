changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: 新功能 / Features
      labels:
        - enhancement
    - title: 修复 / Fixes
      labels:
        - bug
    - title: 维护与依赖 / Maintenance
      labels:
        - dependencies
        - maintenance
    - title: 其他变更 / Other changes
      labels:
        - "*"
